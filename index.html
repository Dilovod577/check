<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевірка реєстрації флешки</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; }
        .result { font-size: 32px; font-weight: bold; padding: 30px; border-radius: 10px; margin-top: 20px; }
        .ok { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .info { font-size: 14px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Перевірка реєстрації флешки</h1>
    <div id="output"></div>

    <script>
        const SECRET = "MY_KEY_2024";

        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function check() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const s = params.get('s');

            const output = document.getElementById('output');

            if (!id || !s) {
                output.innerHTML = '<div class="result fail">НЕМАЄ ДАНИХ</div>';
                return;
            }

            const hash = await sha256(id + SECRET);
            const expected = hash.substring(0, 6);

            if (s === expected) {
                output.innerHTML = `<div class="result ok">ЗАРЕЄСТРОВАНА</div><div class="info">ID: ${id}</div>`;
            } else {
                output.innerHTML = '<div class="result fail">ПІДРОБКА</div>';
            }
        }

        check();
    </script>
</body>
</html>
